name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # create tags + commits
  issues: write # comment on issues
  pull-requests: write # comment on PRs
  id-token: write # npm provenance

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so semantic-release can walk commits
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build workspace engine
        # The proxy imports @node9/policy-engine via npm workspaces, which
        # resolves to packages/policy-engine/dist/. Without this step the
        # subsequent `tsc --noEmit` typecheck can't find the engine's
        # .d.ts files and every type imported from the package collapses
        # to `any` — surfacing as cascading TS2307 / TS7006 errors.
        # Mirrors the same fix in ci.yml.
        run: npm --workspace @node9/policy-engine run build

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: npx semantic-release

      - name: Auto-bump engine version if its files changed
        # Runs AFTER semantic-release (which has pushed the root version bump).
        # We pull latest main, diff packages/policy-engine/ against the last
        # policy-engine-v* tag, and if anything changed, bump the engine and
        # push a new commit + tag. The next step then publishes from the disk
        # version. Empty diff → no bump, no push.
        #
        # First run: no policy-engine-v* tag exists yet. We tag the current
        # version on disk as the baseline and exit. Subsequent runs use that
        # tag as the diff base.
        #
        # Bump type is determined from conventional-commit subjects of commits
        # in the range that touched engine files:
        #   - BREAKING CHANGE: footer or `type(scope)!:` → major
        #   - feat / feat(scope) → minor
        #   - everything else (fix, refactor, perf, etc.) → patch
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
        run: |
          set -euo pipefail

          # Sync with whatever semantic-release just pushed
          git fetch origin main
          git reset --hard origin/main

          LAST_TAG=$(git tag --list 'policy-engine-v*' --sort=-version:refname | head -1 || true)

          # Configure auth + identity once (used by both the baseline-tag branch
          # and the bump branch below)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if [ -z "$LAST_TAG" ]; then
            BASELINE="policy-engine-v$(node -p "require('./packages/policy-engine/package.json').version")"
            echo "No prior engine tag — creating baseline $BASELINE"
            git tag "$BASELINE"
            git push origin "$BASELINE"
            exit 0
          fi

          if git diff --quiet "$LAST_TAG" HEAD -- packages/policy-engine/; then
            echo "No engine changes since $LAST_TAG — skipping bump"
            exit 0
          fi

          # Determine bump type from commits touching engine files
          BUMP="patch"
          while IFS= read -r sha; do
            body=$(git log -1 --format='%B' "$sha")
            # Breaking change marker: `BREAKING CHANGE:` in body or `!:` after type/scope
            if echo "$body" | grep -qE '(BREAKING CHANGE|^[a-z]+(\([^)]+\))?!:)'; then
              BUMP="major"
              break
            fi
            if echo "$body" | grep -qE '^feat(\([^)]+\))?:'; then
              BUMP="minor"
              # keep looking — a later major would override
            fi
          done < <(git log "$LAST_TAG"..HEAD --format='%H' -- packages/policy-engine/)

          echo "Engine files changed since $LAST_TAG — applying $BUMP bump"

          # npm version writes the new version to package.json with no git op
          NEW_VERSION=$(cd packages/policy-engine && npm version "$BUMP" --no-git-tag-version)
          # npm prefixes the output with 'v' — strip for the commit message
          NEW_VERSION="${NEW_VERSION#v}"
          NEW_TAG="policy-engine-v$NEW_VERSION"

          echo "Bumping @node9/policy-engine to $NEW_VERSION"
          git add packages/policy-engine/package.json
          git commit -m "chore(engine): release $NEW_VERSION [skip ci]"
          git tag "$NEW_TAG"
          # --atomic so commit + tag land together or not at all
          git push --atomic origin HEAD:main "$NEW_TAG"

      - name: Publish @node9/policy-engine if not already on npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        # Engine version is auto-bumped by the previous step when files in
        # packages/policy-engine/ change. This step reads the current version
        # from disk and publishes if it isn't already on the registry. The
        # skip path handles three cases:
        #   1. Engine was bumped this run → publishes the new version
        #   2. No engine change since last bump → skips (registry has it)
        #   3. First-ever run / manual override → publishes if needed
        run: |
          ENGINE_VERSION=$(node -p "require('./packages/policy-engine/package.json').version")
          if npm view "@node9/policy-engine@$ENGINE_VERSION" version >/dev/null 2>&1; then
            echo "@node9/policy-engine@$ENGINE_VERSION already on npm — skipping engine publish"
            exit 0
          fi
          echo "Publishing @node9/policy-engine@$ENGINE_VERSION"
          npm --workspace @node9/policy-engine publish

      - name: Sync and publish wrapper (node9-ai)
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Skip wrapper publish when this version is already on npm.
          # Happens when the triggering release was docs-only / refactor and
          # semantic-release didn't bump @node9/proxy — in that case the
          # wrapper version is already at $VERSION and we'd hit a 403.
          if npm view "node9-ai@$VERSION" version >/dev/null 2>&1; then
            echo "node9-ai@$VERSION already on npm — no proxy version bump this cycle, skipping wrapper publish"
            exit 0
          fi
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/node9-ai/node9-wrapper.git /tmp/node9-wrapper
          # Copy README — stay in $GITHUB_WORKSPACE so setup-node npm auth applies
          cp README.md /tmp/node9-wrapper/README.md
          cd /tmp/node9-wrapper
          npm install --ignore-scripts
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi
          # Keep the wrapper's @node9/proxy dependency pinned exactly to the
          # proxy version we're about to publish. Without this the wrapper
          # would freeze on whatever pin was committed last and silently lag
          # behind future proxy releases (the bug that shipped node9-ai@1.18.0
          # depending on a stale @node9/proxy via a loose >=1.11.3 range).
          # `VERSION` is a bash-local variable above (not exported), so prefix
          # it on the command line to make it visible to the node child process.
          # Without this `process.env.VERSION` is undefined and JSON.stringify
          # drops the key entirely — shipping a wrapper with empty `dependencies`
          # (the regression in node9-ai@1.18.1).
          VERSION="$VERSION" node -e "const fs=require('fs'),p=require('./package.json');p.dependencies['@node9/proxy']=process.env.VERSION;fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          git config user.email "release-bot@node9.ai"
          git config user.name "node9-release-bot"
          git add README.md package.json
          git diff --cached --quiet || git commit -m "chore: sync README and bump version to ${VERSION}"
          git diff origin/main..HEAD --quiet || git push
          # Publish from GITHUB_WORKSPACE so NPM_CONFIG_USERCONFIG auth applies.
          # Use npx npm@latest to invoke npm 11.5+, which is required for OIDC
          # trusted-publisher auth on `npm publish` (Node 22 bundles npm 10.9.x
          # which only supports OIDC for provenance signing, not auth). A
          # full `npm install -g npm@latest` would self-clobber its running
          # install on the corepack-managed Node 22 setup, so invoke via npx
          # for one shot only. NODE_AUTH_TOKEN remains in env as a fallback —
          # ignored once npm 11.5+ detects the trusted publisher.
          cd $GITHUB_WORKSPACE
          npx --yes npm@latest publish /tmp/node9-wrapper --provenance --access public --ignore-scripts

      - name: Notify homebrew tap
        run: |
          VERSION=$(node -p "require('./package.json').version")
          curl -s --fail -X POST \
            -H "Authorization: token ${{ secrets.AUTO_PR_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/node9-ai/homebrew-node9/dispatches \
            -d "$(jq -n --arg v "$VERSION" '{event_type:"new-release",client_payload:{version:$v}}')"
