name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify dist artifacts
        run: |
          node -e "require('fs').existsSync('dist/cli.js') || (console.error('Missing: dist/cli.js'), process.exit(1))"
          node -e "require('fs').existsSync('dist/index.js') || (console.error('Missing: dist/index.js'), process.exit(1))"

      - name: Test
        # On ubuntu/Node 22: run with coverage so thresholds (vitest.config.mts) are enforced.
        # On all other matrix cells: plain test run — avoids doubling execution time.
        # Intentional: thresholds only block on this one cell. Branch protection must require
        # the "Test (ubuntu-latest, Node 22)" job specifically to gate the PR.
        # NODE_ENV=test is set automatically by Vitest; NODE9_TESTING=1 guards
        # native popups and daemon auto-start in spawned child processes.
        # Note: matrix.node is typed as string in GHA expressions — use '22' not 22.
        run: ${{ matrix.os == 'ubuntu-latest' && matrix.node == '22' && 'npm run test:coverage' || 'npm test' }}
